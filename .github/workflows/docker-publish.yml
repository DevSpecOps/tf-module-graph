name: Publish Docker image

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  push_to_registry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/devspecops/tf-module-graph:latest
            ${{ env.REGISTRY }}/devspecops/tf-module-graph:${{ github.ref_name }}