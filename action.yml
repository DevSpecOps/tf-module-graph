name: 'tf-module-graph'
description: 'Analyze Terraform module dependencies and detect cycles'
inputs:
  path:
    description: 'Terraform file or directory'
    required: true
    default: '.'
  deps:
    description: 'Show dependency graph and detect cycles'
    required: false
    default: 'true'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - '--path'
    - ${{ inputs.path }}
    - '--deps'